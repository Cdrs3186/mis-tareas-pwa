<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - Mis Tareas (Prueba)</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#b2ebf2">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #e0f7fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 80%; max-width: 300px; }
        h1 { color: #00838f; margin-top: 0; }
        p { color: #555; margin-bottom: 20px; }
        button { background: #00838f; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        button:hover { background: #006064; }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>Mis Tareas</h1>
        <p>Versión PWA de prueba (Sin conexión al servidor)</p>
        <button onclick="entrarDePrueba()">Entrar a la App</button>
    </div>

    <script>
        function entrarDePrueba() {
            // Engañamos a app.html diciéndole que la sesión sí está activa
            localStorage.setItem('sesion_activa', 'true');
            localStorage.setItem('numero_cuenta_actual', 'Usuario Prueba');
            
            // Lo mandamos a la aplicación
            window.location.href = 'app.html';
        }

        // También registramos el Service Worker aquí por si la instalan desde esta pantalla
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>

</body>
</html>
